<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="#1e3a5f"/>
  <rect width="1200" height="630" fill="url(#grad)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="#2563eb" opacity="0.15"/>
  <circle cx="100" cy="550" r="150" fill="#10b981" opacity="0.12"/>
  <circle cx="1050" cy="500" r="120" fill="#f59e0b" opacity="0.1"/>

  <!-- Irish flag accent bar -->
  <rect x="0" y="0" width="12" height="630" fill="#169b62"/>
  <rect x="12" y="0" width="12" height="630" fill="#ffffff"/>
  <rect x="24" y="0" width="12" height="630" fill="#ff883e"/>

  <!-- Main content -->
  <g transform="translate(80, 0)">
    <!-- Icon/Badge -->
    <rect x="0" y="120" width="64" height="64" rx="16" fill="#2563eb"/>
    <text x="32" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" fill="white">📊</text>

    <!-- Main title -->
    <text x="0" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">Ireland Work Permits</text>
    <text x="0" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#60a5fa">Explorer</text>

    <!-- Subtitle -->
    <text x="0" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Official DETE data · 2022–2026 · Free tool for immigrants</text>

    <!-- Stats row -->
    <g transform="translate(0, 430)">
      <!-- Stat 1 -->
      <rect x="0" y="0" width="220" height="80" rx="12" fill="white" opacity="0.08"/>
      <text x="110" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="white">8,000+</text>
      <text x="110" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Companies</text>

      <!-- Stat 2 -->
      <rect x="240" y="0" width="200" height="80" rx="12" fill="white" opacity="0.08"/>
      <text x="340" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="white">26</text>
      <text x="340" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Sectors</text>

      <!-- Stat 3 -->
      <rect x="460" y="0" width="220" height="80" rx="12" fill="white" opacity="0.08"/>
      <text x="570" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#34d399">Free</text>
      <text x="570" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">No signup</text>

      <!-- Stat 4 -->
      <rect x="700" y="0" width="240" height="80" rx="12" fill="white" opacity="0.08"/>
      <text x="820" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="white">PT / EN</text>
      <text x="820" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Bilingual</text>
    </g>

    <!-- URL -->
    <text x="0" y="580" font-family="system-ui, sans-serif" font-size="22" fill="#60a5fa">ie-work-permits.com</text>
  </g>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
</svg>
